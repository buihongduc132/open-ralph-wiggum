# .ralph-review-gate rules
# Consumed by ralph buildPrompt() via {{inject:modulo}} in _GOAL.

[rules.modulo]
name = "modulo"
enabled = true

[[rules.modulo.entries]]
at = 5
prompt = """
I % 5 == 0 (SYNC — Lateral Alignment):
1. Commit current progress
2. Update flow/plans/review-gate-impl/progress.md
3. Run `bun test` — must pass with exit code 0
4. Check if any Phase gate can be opened/closed
"""

[[rules.modulo.entries]]
at = 7
prompt = """
I % 7 == 0 (BACKWARD HUNT — READ-ONLY):
**READ-ONLY**: No implementation changes this iteration. Record and demote only.

1. Run ALL tests — `bun test` must pass with exit code 0
2. Check for stubs, fakes, hardcoded returns, incomplete implementations
3. Compare implementation against plan documents (over/under-engineering)
4. Check backward compat: run with NO [review] section → must behave identically
5. Check atomic saveState: verify temp file + rename pattern used
6. DEMOTION rule: If ANY finding → completed → in_progress
7. Record findings into inventory with problem_notes
8. DO NOT fix — next forward iteration picks up the problems
"""

[[rules.modulo.entries]]
at = 11
prompt = """
I % 11 == 0 (INTRA-FUNCTIONALITY DEEP REVIEW — READ-ONLY):
**READ-ONLY**: Deep audit of ONE task or area.

Pick the task most at risk (most complex, most changed, most edge cases).
For that task:
1. Trace EVERY test case from plan §11 against implementation
2. Check EVERY edge case, error path, boundary condition
3. Verify perf budgets (voter timeout, state write latency)
4. Check import layer compliance (no cross-boundary imports)
5. Record findings into inventory
6. DO NOT fix — next forward iteration picks up
"""

[[rules.modulo.entries]]
at = 15
prompt = """
I % 15 == 0 (FORWARD-GUARD — Coding Guard Cycle):
**This is a FORWARD-GUARD iteration — it DOES produce code (in guard-orches) and run scans.**

Guard repo: `/home/bhd/Documents/Projects/bhd/guard-orches`
Ralph source: `/home/bhd/Documents/Projects/bhd/open-ralph-wiggum-wt-review-gate`

1. **IDENTIFY**: Look at current ralph source code. Identify 1-3 code smell patterns, bad practices, or structural issues that guard-orches rules could catch (e.g., non-atomic file writes, missing error handling in subprocess spawn, unvalidated config inputs, race conditions in vote state).
2. **IMPLEMENT**: Pick the most impactful 1 guard. Write or improve the ast-grep rule in `/home/bhd/Documents/Projects/bhd/guard-orches/.sg-rules/` that captures this pattern.
3. **RUN**: Execute the guard scan against ralph source:
   ```bash
   cd /home/bhd/Documents/Projects/bhd/guard-orches && npx sg-scan --rules .sg-rules/ /home/bhd/Documents/Projects/bhd/open-ralph-wiggum-wt-review-gate/src /home/bhd/Documents/Projects/bhd/open-ralph-wiggum-wt-review-gate/tests
   ```
4. **RECORD**: Log ALL violations found into `inventory.json` under `problem_notes` for affected task IDs.
5. Commit the guard rule improvement in guard-orches.
6. Commit the updated `inventory.json` in the worktree.
"""

[[rules.modulo.entries]]
at = 17
prompt = """
I % 17 == 0 (CROSS-FUNCTIONALITY INTEGRATION REVIEW — READ-ONLY):
**READ-ONLY**: Check across the seams.

1. Layer boundaries: types.ts → runtime-config.ts → review-gate.ts → ralph.ts — verify clean imports
2. Data contracts: RalphState ↔ reviewGate ↔ votes ↔ state file — verify round-trip
3. Review gate E2E: inner COMPLETED → intercept → dispatch voters → quorum → approve/reject → feedback injection
4. Config consistency: TOML [review] ↔ ReviewConfig ↔ defaults for missing fields
5. Mode parity: legacy (no [review]) vs review-enabled — zero behavioral diff for legacy
6. Smoke test: full review flow with 1 voter (fast) → approve → break
7. Record findings into inventory
"""

# ── STATE INJECTION ──

[state_injection]
source = "inventory.json"
max_next = 3
max_prev = 2
show_status = true
reminder = """
Full inventory is at .ralph-review-gate/inventory.json.
If listed tasks are not sufficient, read and modify the inventory file directly.
"""
