<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="141" height="20" role="img" aria-label="unit coverage: 100%">
  <linearGradient id="smooth" x2="0" y2="100%">
    <stop offset="0" stop-color="#ffffff" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <mask id="round">
    <rect width="141" height="20" rx="3" fill="#fff"/>
  </mask>
  <g mask="url(#round)">
    <rect width="101" height="20" fill="#24292f"/>
    <rect x="101" width="40" height="20" fill="#2ea043"/>
    <rect width="141" height="20" fill="url(#smooth)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="50" y="15">unit coverage</text>
    <text x="121" y="15">100%</text>
  </g>
</svg>
